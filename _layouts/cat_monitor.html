<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Monitor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      color: white;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .section-label {
      width: 100%;
      padding: 10px 16px;
      background: #111;
      font-size: 13px;
      font-weight: bold;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .images-wrap {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      background: #000;
    }

    .image-box {
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    .camera-image {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="section-label" id="timelapse-label">Daily Timelapse</div>
    <div class="images-wrap">
      <div class="image-box">
        <img id="timelapse-image" class="camera-image" alt="Daily Timelapse" />
      </div>
    </div>

    <div class="section-label">Live View</div>
    <div class="images-wrap">
      <div class="image-box">
        <img id="main-image" class="camera-image" alt="Live Camera" />
      </div>
    </div>

  </div>

  <script>
    // Set timelapse label with dates
    function setTimelapseLabel() {
      const now = new Date();

      const today = new Date(now);
      today.setHours(9, 0, 0, 0);

      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      const fmt = (d) => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

      document.getElementById('timelapse-label').textContent =
        `Daily Timelapse — 9am ${fmt(yesterday)} to 9am ${fmt(today)}`;
    }

    setTimelapseLabel();
  </script>

  <script>
    const LIVE_DRIVE_ID = "1ylnOsWs3prkiBh0Hgla9pVikjnORba-i";
    const TIMELAPSE_DRIVE_ID = "10VCEPnwHztf655SuBe3VmxzXE5P4YeO6";

    const IMAGES = [
      { driveId: TIMELAPSE_DRIVE_ID, imgId: "timelapse-image", refresh: false },
      { driveId: LIVE_DRIVE_ID,      imgId: "main-image",      refresh: true  }
    ];

    const activeBlobUrls = {};

    function generateAllPossibleUrls(driveId) {
      const timestamp = Date.now();
      const randomParam = Math.random().toString(36).substring(2, 10);
      return [
        `https://lh3.googleusercontent.com/d/${driveId}=w2000&t=${timestamp}&r=${randomParam}`,
        `https://drive.google.com/uc?id=${driveId}&export=download&t=${timestamp}&r=${randomParam}`,
        `https://lh3.googleusercontent.com/d/${driveId}?t=${timestamp}&r=${randomParam}`
      ];
    }

    function getCORSProxies() {
      return [
        'https://api.allorigins.win/raw?url=',
        'https://api.codetabs.com/v1/proxy?quest=',
        'https://corsproxy.io/?',
        'https://thingproxy.freeboard.io/fetch/'
      ];
    }

    async function extremeFetchImage(driveId, isRefresh = false) {
      const urls = generateAllPossibleUrls(driveId);

      for (const url of urls) {
        try {
          const response = await fetch(url, {
            mode: 'cors',
            credentials: 'omit',
            referrerPolicy: 'no-referrer',
            cache: 'no-store'
          });
          if (response.ok) {
            const blob = await response.blob();
            if (blob.size > 0 && blob.type.startsWith('image/')) {
              return URL.createObjectURL(blob);
            }
          }
        } catch (e) {}
      }

      if (isRefresh) return null;

      const proxies = getCORSProxies();
      for (const proxy of proxies) {
        for (const url of urls.slice(0, 2)) {
          try {
            const proxyUrl = proxy + encodeURIComponent(url);
            const response = await fetch(proxyUrl, { cache: 'no-store' });
            if (response.ok) {
              const blob = await response.blob();
              if (blob.size > 1000 && blob.type.startsWith('image/')) {
                return URL.createObjectURL(blob);
              }
            }
          } catch (e) {}
        }
      }

      return null;
    }

    function preloadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve();
        img.onerror = reject;
        img.src = src;
      });
    }

    async function swapImageWithoutFlash(imgElement, newSrc, imgKey) {
      try {
        await preloadImage(newSrc);
        const oldSrc = imgElement.src;
        imgElement.src = newSrc;

        if (activeBlobUrls[imgKey] && activeBlobUrls[imgKey].startsWith('blob:') && activeBlobUrls[imgKey] !== newSrc) {
          URL.revokeObjectURL(activeBlobUrls[imgKey]);
        }
        activeBlobUrls[imgKey] = newSrc;

        if (oldSrc && oldSrc.startsWith('blob:') && oldSrc !== newSrc && oldSrc !== activeBlobUrls[imgKey]) {
          try { URL.revokeObjectURL(oldSrc); } catch (e) {}
        }
      } catch (error) {
        if (newSrc && newSrc.startsWith('blob:')) {
          URL.revokeObjectURL(newSrc);
        }
      }
    }

    async function refreshImage(imageConfig) {
      const imgElement = document.getElementById(imageConfig.imgId);
      if (!imgElement) return;
      const newUrl = await extremeFetchImage(imageConfig.driveId, true);
      if (!newUrl) return;
      await swapImageWithoutFlash(imgElement, newUrl, imageConfig.imgId);
    }

    async function loadInitialImages() {
      for (const imageConfig of IMAGES) {
        const imgElement = document.getElementById(imageConfig.imgId);
        const initialUrl = await extremeFetchImage(imageConfig.driveId, false);
        if (initialUrl && imgElement) {
          await swapImageWithoutFlash(imgElement, initialUrl, imageConfig.imgId);
        }
      }
    }

    function startAutoRefresh() {
      setInterval(() => {
        for (const imageConfig of IMAGES) {
          if (imageConfig.refresh) {
            refreshImage(imageConfig);
          }
        }
      }, 5000);
    }

    async function init() {
      await loadInitialImages();
      startAutoRefresh();
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
